<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETH策略系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="toolbar card">
        <div class="toolbar-row toolbar-row-main">
          <div class="toolbar-item grow">
            <label>策略</label>
            <div class="toolbar-inline">
              <select id="strategy-select" class="toolbar-value strategy-select"></select>
              <button id="import-strategy-btn" class="secondary-btn">导入策略</button>
              <input id="strategy-file-input" type="file" accept=".py" class="hidden" />
            </div>
          </div>
          <div class="toolbar-item">
            <label>品种</label>
            <div id="meta-instrument" class="toolbar-value">ETH-USDT-SWAP</div>
          </div>
          <div class="toolbar-item">
            <label>周期</label>
            <select id="bar-select" class="toolbar-value">
              <option value="1m">1m</option>
              <option value="3m">3m</option>
              <option value="5m">5m</option>
              <option value="15m" selected>15m</option>
              <option value="30m">30m</option>
              <option value="1H">1H</option>
              <option value="2H">2H</option>
              <option value="4H">4H</option>
              <option value="1D">1D</option>
            </select>
          </div>
          <div class="toolbar-item toolbar-refresh">
            <label>刷新</label>
            <button id="refresh-btn" class="primary-btn">立即刷新</button>
            <div id="meta-refresh" class="toolbar-meta muted">实时推送</div>
          </div>
        </div>
      </section>

      <main class="content-grid layout-side-focus">
        <section class="chart-panel card">
          <div class="panel-header panel-header-tight">
            <h2>行情主图</h2>
            <div id="chart-range" class="muted">等待数据</div>
          </div>
          <div class="chart-hover-banner">
            <span class="chart-hover-label muted">图表中文解读</span>
            <div id="hover-info" class="chart-hover-text">将鼠标移动到图表上</div>
          </div>
          <div id="price-chart" class="chart price-chart"></div>
          <div class="subchart-title">RSI(14)</div>
          <div id="rsi-chart" class="chart indicator-chart rsi-chart"></div>
          <div class="subchart-title">MACD(12,26,9)</div>
          <div id="macd-chart" class="chart indicator-chart macd-chart"></div>
        </section>

        <aside class="side-panel side-panel-stacked">
          <section class="card side-card price-card">
            <div class="panel-header panel-header-tight">
              <h2>实时成交价</h2>
              <div id="last-update" class="muted">等待首次刷新</div>
            </div>
            <div id="price-value" class="headline-price">-</div>
            <div id="price-subvalue" class="metric-subvalue muted">K线收盘价：-</div>
          </section>

          <section class="card side-card signal-card">
            <div class="panel-header panel-header-tight">
              <h2>交易建议</h2>
              <div id="signal-badge" class="signal-badge idle">观望中</div>
            </div>
            <div class="side-metric-grid">
              <div class="side-metric-item">
                <span>当前建议</span>
                <strong id="signal-value">-</strong>
              </div>
              <div class="side-metric-item">
                <span>建议方向</span>
                <strong id="suggested-side">-</strong>
              </div>
              <div class="side-metric-item">
                <span>建议开仓价</span>
                <strong id="suggested-entry">-</strong>
              </div>
              <div class="side-metric-item">
                <span>建议止损</span>
                <strong id="suggested-stop-loss">-</strong>
              </div>
              <div class="side-metric-item">
                <span>建议止盈</span>
                <strong id="suggested-take-profit">-</strong>
              </div>
            </div>
            <div id="quick-hint" class="quick-hint">等待信号刷新</div>
          </section>

          <section class="card side-card status-card">
            <div class="panel-header panel-header-tight">
              <h2>连接状态</h2>
            </div>
            <div id="ws-status" class="status-display status-display-large"><span id="ws-status-dot" class="status-dot status-offline"></span><span id="ws-status-text">-</span></div>
            <div class="status-note muted">主图K线优先按 OKX candle 数据同步</div>
          </section>

          <section class="card side-card analysis-card">
            <div class="panel-header panel-header-tight">
              <h2>分析信息</h2>
            </div>
            <div class="analysis-keyline" id="market-regime">-</div>
            <div class="quick-hint" id="analysis-title">等待分析</div>
            <div class="muted" id="analysis-bias">-</div>
            <div class="muted" id="analysis-confidence">-</div>
            <p id="analysis-description" class="muted">等待分析结果</p>
          </section>
        </aside>
      </main>
    </div>

    <script src="./vendor/lightweight-charts.standalone.production.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
