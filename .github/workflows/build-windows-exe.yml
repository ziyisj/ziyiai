name: build-windows-exe

on:
  workflow_dispatch:
  push:
    paths:
      - 'windows-desktop/**'
      - 'web-dashboard/**'
      - 'src/eth_backtester/**'
      - 'presets/**'
      - 'tradingview/**'
      - 'requirements-desktop.txt'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      APP_VERSION: v0.1.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install desktop build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-desktop.txt

      - name: Build Windows EXEs
        run: |
          python -m PyInstaller --noconfirm --clean windows-desktop/ETH_15M_Signal_Desktop.spec
          python -m PyInstaller --noconfirm --clean windows-desktop/ETH_15M_Web_Dashboard.spec

      - name: Prepare versioned release assets
        shell: powershell
        run: |
          Copy-Item "dist/ETH策略系统.exe" "dist/ETH策略系统-${env:APP_VERSION}.exe"
          Compress-Archive -Path "dist/ETH策略系统.exe" -DestinationPath "dist/ETH策略系统-${env:APP_VERSION}.zip" -Force

      - name: Upload desktop EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETH_15M_Signal_Desktop
          path: dist/ETH_15M_Signal_Desktop.exe

      - name: Upload web dashboard EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETH策略系统
          path: dist/ETH策略系统.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: ETH策略系统 ${{ env.APP_VERSION }}
          generate_release_notes: true
          files: |
            dist/ETH策略系统-${{ env.APP_VERSION }}.exe
            dist/ETH策略系统-${{ env.APP_VERSION }}.zip
